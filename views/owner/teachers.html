<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Teachers | QUIZGEN ERP</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <style>
    .filter-bar {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Content Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Teacher Directory</h2>
            <p class="text-muted small mb-0">Add, edit, remove, reset passwords, and assign classes or subjects to
              faculty members.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTeacherModal">
              <i class="fas fa-plus-circle me-1"></i> Add Teacher
            </button>
          </div>
        </div>

        <!-- Advanced Filter Bar -->
        <div class="filter-bar shadow-sm">
          <form id="filter-form" class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label small fw-semibold text-muted">Search Name / Email</label>
              <input type="text" id="search-input" class="form-control" placeholder="Search...">
            </div>
            <div class="col-md-2">
              <label class="form-label small fw-semibold text-muted">Designation</label>
              <select id="designation-filter" class="form-select">
                <option value="">All Designations</option>
                <option value="Professor">Professor</option>
                <option value="Lecturer">Lecturer</option>
                <option value="Instructor">Instructor</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label small fw-semibold text-muted">Status</label>
              <select id="status-filter" class="form-select">
                <option value="">All Statuses</option>
                <option value="active">Active Only</option>
                <option value="inactive">Deactivated Only</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold text-muted">Subject Assigned</label>
              <select id="subject-filter" class="form-select">
                <option value="">All Subjects</option>
              </select>
            </div>
            <div class="col-md-2 d-flex gap-2">
              <button type="button" id="reset-filters" class="btn btn-outline-secondary w-100"><i
                  class="fas fa-undo me-1"></i> Reset</button>
            </div>
          </form>
        </div>

        <!-- Data Table Card -->
        <div class="erp-card p-0 overflow-hidden shadow-sm">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0" id="teachers-table">
              <thead class="table-light">
                <tr>
                  <th style="cursor: pointer;" data-sort="name">Teacher Name <i
                      class="fas fa-sort ms-1 small text-muted"></i></th>
                  <th style="cursor: pointer;" data-sort="email">Email <i class="fas fa-sort ms-1 small text-muted"></i>
                  </th>
                  <th>Designation</th>
                  <th>Assigned Classes</th>
                  <th>Assigned Subjects</th>
                  <th>Status</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="teachers-tbody">
                <tr>
                  <td colspan="7" class="text-center py-4 text-muted">Fetching faculty records...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- Pagination -->
          <div class="d-flex justify-content-between align-items-center p-3 border-top border-color">
            <span class="small text-muted" id="table-info">Showing 0 of 0 entries</span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="pagination-controls">
                <!-- Dynamic controls -->
              </ul>
            </nav>
          </div>
        </div>
      </div>

      <!-- Add Teacher Modal -->
      <div class="modal fade" id="addTeacherModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-user-plus me-1 text-primary"></i> Create Teacher Account
              </h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-teacher-form">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Full Name</label>
                    <input type="text" id="add-name" class="form-control" required placeholder="e.g. Dr. Jane Doe">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Email Address</label>
                    <input type="email" id="add-email" class="form-control" required placeholder="name@rajcomputer.com">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Default Password</label>
                    <input type="password" id="add-password" class="form-control" required minlength="6"
                      placeholder="Min 6 characters">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Designation</label>
                    <input type="text" id="add-designation" class="form-control" placeholder="e.g. Senior Professor">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Assign Classes (Hold Ctrl to Multi-select)</label>
                    <select id="add-classes" class="form-select" multiple style="height: 120px;"></select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Assign Subjects (Hold Ctrl to Multi-select)</label>
                    <select id="add-subjects" class="form-select" multiple style="height: 120px;"></select>
                  </div>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary px-4">Create Account</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Teacher Modal -->
      <div class="modal fade" id="editTeacherModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit me-1 text-primary"></i> Edit Faculty Member</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-teacher-form">
                <input type="hidden" id="edit-id">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Full Name</label>
                    <input type="text" id="edit-name" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Email Address</label>
                    <input type="email" id="edit-email" class="form-control" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Designation</label>
                    <input type="text" id="edit-designation" class="form-control">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Account Status</label>
                    <select id="edit-status" class="form-select">
                      <option value="true">Active / Enabled</option>
                      <option value="false">Deactivated / Disabled</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Assign Classes (Hold Ctrl to Multi-select)</label>
                    <select id="edit-classes" class="form-select" multiple style="height: 120px;"></select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold small">Assign Subjects (Hold Ctrl to Multi-select)</label>
                    <select id="edit-subjects" class="form-select" multiple style="height: 120px;"></select>
                  </div>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let allTeachers = [];
    let filteredTeachers = [];
    let classesList = [];
    let subjectsList = [];

    // Filter states
    let searchVal = '';
    let desigFilter = '';
    let statusFilter = '';
    let subjectFilterVal = '';

    // Sort states
    let sortColumn = 'name';
    let sortAsc = true;

    // Pagination states
    let currentPage = 1;
    const rowsPerPage = 7;

    document.addEventListener('DOMContentLoaded', async () => {
      // Load classes/subjects lists for multi-selects and filters
      await Promise.all([loadClasses(), loadSubjects()]);
      await loadTeachers();

      // Setup filters event listeners
      document.getElementById('search-input').addEventListener('input', (e) => {
        searchVal = e.target.value.toLowerCase().trim();
        applyFilters();
      });
      document.getElementById('designation-filter').addEventListener('change', (e) => {
        desigFilter = e.target.value;
        applyFilters();
      });
      document.getElementById('status-filter').addEventListener('change', (e) => {
        statusFilter = e.target.value;
        applyFilters();
      });
      document.getElementById('subject-filter').addEventListener('change', (e) => {
        subjectFilterVal = e.target.value;
        applyFilters();
      });
      document.getElementById('reset-filters').addEventListener('click', () => {
        document.getElementById('filter-form').reset();
        searchVal = '';
        desigFilter = '';
        statusFilter = '';
        subjectFilterVal = '';
        applyFilters();
      });

      // Sorting
      document.querySelectorAll('#teachers-table th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const column = th.getAttribute('data-sort');
          if (sortColumn === column) {
            sortAsc = !sortAsc;
          } else {
            sortColumn = column;
            sortAsc = true;
          }
          applyFilters();
        });
      });

      // Handle add teacher submit
      document.getElementById('add-teacher-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const classOpts = document.getElementById('add-classes');
        const subjectOpts = document.getElementById('add-subjects');

        const classIds = Array.from(classOpts.selectedOptions).map(opt => opt.value);
        const subjectIds = Array.from(subjectOpts.selectedOptions).map(opt => opt.value);

        const data = {
          name: document.getElementById('add-name').value.trim(),
          email: document.getElementById('add-email').value.trim(),
          password: document.getElementById('add-password').value,
          designation: document.getElementById('add-designation').value.trim(),
          classIds,
          subjectIds
        };

        try {
          const res = await api.post('/owner/teachers', data);
          if (res && res.success) {
            showToast('Teacher account created successfully.', 'success');
            bootstrap.Modal.getInstance(document.getElementById('addTeacherModal')).hide();
            document.getElementById('add-teacher-form').reset();
            await loadTeachers();
          } else {
            showToast(res.message || 'Failed to create teacher.', 'danger');
          }
        } catch (err) {
          showToast(err.message || 'Error creating account.', 'danger');
        }
      });

      // Handle edit teacher submit
      document.getElementById('edit-teacher-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const classOpts = document.getElementById('edit-classes');
        const subjectOpts = document.getElementById('edit-subjects');

        const classIds = Array.from(classOpts.selectedOptions).map(opt => opt.value);
        const subjectIds = Array.from(subjectOpts.selectedOptions).map(opt => opt.value);

        const data = {
          name: document.getElementById('edit-name').value.trim(),
          email: document.getElementById('edit-email').value.trim(),
          designation: document.getElementById('edit-designation').value.trim(),
          isActive: document.getElementById('edit-status').value === 'true',
          classIds,
          subjectIds
        };

        try {
          const res = await api.put(`/owner/teachers/${id}`, data);
          if (res && res.success) {
            showToast('Teacher changes saved successfully.', 'success');
            bootstrap.Modal.getInstance(document.getElementById('editTeacherModal')).hide();
            await loadTeachers();
          } else {
            showToast(res.message || 'Failed to update teacher.', 'danger');
          }
        } catch (err) {
          showToast(err.message || 'Error updating teacher.', 'danger');
        }
      });

      // Load footer
      fetch('/partials/footer.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('footer-container').innerHTML = html;
        });
    });

    async function loadClasses() {
      try {
        const res = await api.get('/owner/classes');
        if (res && res.success) {
          classesList = res.data;
          const selectAdd = document.getElementById('add-classes');
          const selectEdit = document.getElementById('edit-classes');
          selectAdd.innerHTML = '';
          selectEdit.innerHTML = '';
          classesList.forEach(c => {
            selectAdd.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            selectEdit.innerHTML += `<option value="${c.id}">${c.name}</option>`;
          });
        }
      } catch (err) {
        console.error('Error loading classes:', err);
      }
    }

    async function loadSubjects() {
      try {
        const res = await api.get('/owner/subjects');
        if (res && res.success) {
          subjectsList = res.data;
          const selectAdd = document.getElementById('add-subjects');
          const selectEdit = document.getElementById('edit-subjects');
          const selectFilter = document.getElementById('subject-filter');
          selectAdd.innerHTML = '';
          selectEdit.innerHTML = '';
          selectFilter.innerHTML = '<option value="">All Subjects</option>';
          subjectsList.forEach(s => {
            selectAdd.innerHTML += `<option value="${s.id}">${s.name} (${s.className})</option>`;
            selectEdit.innerHTML += `<option value="${s.id}">${s.name} (${s.className})</option>`;
            selectFilter.innerHTML += `<option value="${s.id}">${s.name} (${s.className})</option>`;
          });
        }
      } catch (err) {
        console.error('Error loading subjects:', err);
      }
    }

    async function loadTeachers() {
      try {
        const res = await api.get('/owner/teachers');
        if (res && res.success) {
          allTeachers = res.data;
          applyFilters();
        }
      } catch (err) {
        showToast('Error loading teacher list.', 'danger');
      }
    }

    function applyFilters() {
      filteredTeachers = allTeachers.filter(t => {
        // Search matches name or email
        const matchesSearch = t.name.toLowerCase().includes(searchVal) || t.email.toLowerCase().includes(searchVal);

        // Designation matches
        const matchesDesig = !desigFilter || t.designation.includes(desigFilter);

        // Status matches
        let matchesStatus = true;
        if (statusFilter === 'active') matchesStatus = t.isActive;
        else if (statusFilter === 'inactive') matchesStatus = !t.isActive;

        // Subject matches
        let matchesSubject = true;
        if (subjectFilterVal) {
          matchesSubject = t.subjects.some(sub => String(sub.id) === String(subjectFilterVal));
        }

        return matchesSearch && matchesDesig && matchesStatus && matchesSubject;
      });

      // Sort
      filteredTeachers.sort((a, b) => {
        let valA = a[sortColumn] || '';
        let valB = b[sortColumn] || '';
        if (typeof valA === 'string') {
          return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        }
        return sortAsc ? (valA - valB) : (valB - valA);
      });

      // Update table sorting icons
      document.querySelectorAll('#teachers-table th[data-sort]').forEach(th => {
        const col = th.getAttribute('data-sort');
        const icon = th.querySelector('i');
        if (col === sortColumn) {
          icon.className = sortAsc ? 'fas fa-sort-up ms-1 text-primary' : 'fas fa-sort-down ms-1 text-primary';
        } else {
          icon.className = 'fas fa-sort ms-1 text-muted small';
        }
      });

      currentPage = 1;
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('teachers-tbody');
      tbody.innerHTML = '';

      if (filteredTeachers.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">No teachers found matching criteria.</td></tr>`;
        document.getElementById('table-info').textContent = 'Showing 0 of 0 entries';
        document.getElementById('pagination-controls').innerHTML = '';
        return;
      }

      // Pagination slice
      const startIndex = (currentPage - 1) * rowsPerPage;
      const endIndex = Math.min(startIndex + rowsPerPage, filteredTeachers.length);
      const pageTeachers = filteredTeachers.slice(startIndex, endIndex);

      pageTeachers.forEach(t => {
        const clsBadges = t.classes.map(c => `<span class="badge bg-secondary me-1">${c.name}</span>`).join('') || '<span class="text-muted small">None</span>';
        const subBadges = t.subjects.map(s => `<span class="badge bg-info text-dark me-1">${s.name}</span>`).join('') || '<span class="text-muted small">None</span>';
        const statusLabel = t.isActive
          ? '<span class="badge bg-success"><i class="fas fa-check me-1"></i> Active</span>'
          : '<span class="badge bg-danger"><i class="fas fa-times me-1"></i> Inactive</span>';

        tbody.innerHTML += `
          <tr>
            <td>
              <div class="d-flex align-items-center gap-2">
                <img src="${t.profilePic || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png'}" class="rounded-circle" style="width:36px; height:36px; object-fit:cover;">
                <span class="fw-semibold">${t.name}</span>
              </div>
            </td>
            <td><code>${t.email}</code></td>
            <td>${t.designation}</td>
            <td>${clsBadges}</td>
            <td>${subBadges}</td>
            <td>${statusLabel}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary me-1" onclick="openEditModal('${t.id}')" title="Edit Teacher"><i class="fas fa-edit"></i></button>
              <button class="btn btn-sm btn-outline-warning me-1" onclick="resetPassword('${t.id}')" title="Reset Password"><i class="fas fa-key"></i></button>
              <button class="btn btn-sm btn-outline-danger" onclick="deleteTeacher('${t.id}')" title="Delete Account"><i class="fas fa-trash-alt"></i></button>
            </td>
          </tr>
        `;
      });

      document.getElementById('table-info').textContent = `Showing ${startIndex + 1} to ${endIndex} of ${filteredTeachers.length} entries`;
      renderPagination();
    }

    function renderPagination() {
      const controls = document.getElementById('pagination-controls');
      controls.innerHTML = '';

      const totalPages = Math.ceil(filteredTeachers.length / rowsPerPage);
      if (totalPages <= 1) return;

      controls.innerHTML += `
        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
          <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">Prev</a>
        </li>
      `;

      for (let i = 1; i <= totalPages; i++) {
        controls.innerHTML += `
          <li class="page-item ${currentPage === i ? 'active' : ''}">
            <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
          </li>
        `;
      }

      controls.innerHTML += `
        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
          <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">Next</a>
        </li>
      `;
    }

    function changePage(page) {
      const totalPages = Math.ceil(filteredTeachers.length / rowsPerPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function openEditModal(id) {
      const t = allTeachers.find(item => String(item.id) === String(id));
      if (!t) return;

      document.getElementById('edit-id').value = t.id;
      document.getElementById('edit-name').value = t.name;
      document.getElementById('edit-email').value = t.email;
      document.getElementById('edit-designation').value = t.designation;
      document.getElementById('edit-status').value = String(t.isActive);

      // Select assigned classes
      const classSelect = document.getElementById('edit-classes');
      Array.from(classSelect.options).forEach(opt => {
        opt.selected = t.classes.some(c => String(c.id) === String(opt.value));
      });

      // Select assigned subjects
      const subSelect = document.getElementById('edit-subjects');
      Array.from(subSelect.options).forEach(opt => {
        opt.selected = t.subjects.some(s => String(s.id) === String(opt.value));
      });

      const editModal = new bootstrap.Modal(document.getElementById('editTeacherModal'));
      editModal.show();
    }

    async function resetPassword(id) {
      const pwd = prompt('Enter a new password for this teacher (minimum 6 characters):');
      if (!pwd) return;
      if (pwd.length < 6) {
        alert('Password too short!');
        return;
      }

      try {
        const res = await api.put(`/owner/teachers/${id}/reset-password`, { newPassword: pwd });
        if (res && res.success) {
          showToast('Password reset successfully.', 'success');
        } else {
          showToast(res.message || 'Failed to reset password.', 'danger');
        }
      } catch (err) {
        showToast('Server error.', 'danger');
      }
    }

    async function deleteTeacher(id) {
      if (!confirm('Are you absolutely sure you want to delete this teacher account? This will orphan assigned classes/subjects.')) return;

      try {
        const res = await api.delete(`/owner/teachers/${id}`);
        if (res && res.success) {
          showToast('Teacher deleted successfully.', 'success');
          await loadTeachers();
        } else {
          showToast(res.message || 'Failed to delete.', 'danger');
        }
      } catch (err) {
        showToast('Server error.', 'danger');
      }
    }

    function showToast(message, type = 'success') {
      let container = document.querySelector('.toast-container');
      if (!container) {
        container = document.createElement('div');
        container.className = 'toast-container';
        document.body.appendChild(container);
      }

      const toast = document.createElement('div');
      toast.className = `erp-toast toast-${type}`;
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.innerHTML = `
        <i class="fas ${icon}" style="color: var(--${type === 'success' ? 'success' : 'danger'})"></i>
        <span style="font-weight: 500">${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
</body>

</html>
