<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Semesters | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Manage Semesters</h2>
            <p class="text-muted small mb-0">Define, edit, and delete semesters linked to courses.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSemModal">
              <i class="fas fa-plus-circle me-1"></i> Add Semester
            </button>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Semester Name</th>
                  <th>Associated Course</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="semesters-tbody">
                <tr>
                  <td colspan="3" class="text-center py-4 text-muted">Reading semesters database...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Add Semester Modal -->
      <div class="modal fade" id="addSemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle text-primary me-1"></i> Add Academic Semester</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-sem-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Title</label>
                  <input type="text" id="add-sem-name" class="form-control" required placeholder="e.g. Semester 1 (Autumn)">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Association</label>
                  <select id="add-sem-course" class="form-select" required></select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Create Semester</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Semester Modal -->
      <div class="modal fade" id="editSemModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit text-primary me-1"></i> Edit Semester</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-sem-form">
                <input type="hidden" id="edit-sem-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Title</label>
                  <input type="text" id="edit-sem-name" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Association</label>
                  <select id="edit-sem-course" class="form-select" required></select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await principal.populateCourseDropdown('add-sem-course');
      await principal.populateCourseDropdown('edit-sem-course');
      await principal.loadSemesters();

      document.getElementById('add-sem-form').addEventListener('submit', principal.createSemester);
      document.getElementById('edit-sem-form').addEventListener('submit', principal.updateSemester);
    });
  </script>
</body>
</html>
