<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Timetable | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Class Timetable Scheduler</h2>
            <p class="text-muted small mb-0">Build and maintain the weekly lecture scheduling parameters.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSlotModal">
              <i class="fas fa-plus-circle me-1"></i> Add Timetable Slot
            </button>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Day</th>
                  <th>Semester</th>
                  <th>Subject</th>
                  <th>Teacher</th>
                  <th>Time Slot</th>
                  <th>Room</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="timetable-tbody">
                <tr>
                  <td colspan="7" class="text-center py-4 text-muted">Reading weekly timetable...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Add Timetable Slot Modal -->
      <div class="modal fade" id="addSlotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-calendar-plus text-primary me-1"></i> Add Lecture Slot</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-slot-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Day of Week</label>
                  <select id="add-slot-day" class="form-select" required>
                    <option value="" disabled selected>Select Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Placement</label>
                  <select id="add-slot-sem" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Subject</label>
                  <select id="add-slot-subject" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Teacher</label>
                  <select id="add-slot-teacher" class="form-select" required></select>
                </div>
                <div class="row g-3 mb-3">
                  <div class="col-6">
                    <label class="form-label fw-semibold small">Start Time</label>
                    <input type="text" id="add-slot-start" class="form-control" required placeholder="e.g. 09:00 AM">
                  </div>
                  <div class="col-6">
                    <label class="form-label fw-semibold small">End Time</label>
                    <input type="text" id="add-slot-end" class="form-control" required placeholder="e.g. 10:00 AM">
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Lecture Room / Hall</label>
                  <input type="text" id="add-slot-room" class="form-control" placeholder="e.g. Room 402">
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Schedule Lecture</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Timetable Slot Modal -->
      <div class="modal fade" id="editSlotModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit text-primary me-1"></i> Edit Lecture Slot</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-slot-form">
                <input type="hidden" id="edit-slot-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Day of Week</label>
                  <select id="edit-slot-day" class="form-select" required>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Placement</label>
                  <select id="edit-slot-sem" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Subject</label>
                  <select id="edit-slot-subject" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Teacher</label>
                  <select id="edit-slot-teacher" class="form-select" required></select>
                </div>
                <div class="row g-3 mb-3">
                  <div class="col-6">
                    <label class="form-label fw-semibold small">Start Time</label>
                    <input type="text" id="edit-slot-start" class="form-control" required>
                  </div>
                  <div class="col-6">
                    <label class="form-label fw-semibold small">End Time</label>
                    <input type="text" id="edit-slot-end" class="form-control" required>
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Lecture Room / Hall</label>
                  <input type="text" id="edit-slot-room" class="form-control">
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await principal.populateSemesterDropdown('add-slot-sem');
      await principal.populateSemesterDropdown('edit-slot-sem');
      await principal.populateSubjectsDropdown('add-slot-subject');
      await principal.populateSubjectsDropdown('edit-slot-subject');
      await principal.populateTeachersDropdown('add-slot-teacher');
      await principal.populateTeachersDropdown('edit-slot-teacher');
      
      await principal.loadTimetables();

      document.getElementById('add-slot-form').addEventListener('submit', principal.createTimetableSlot);
      document.getElementById('edit-slot-form').addEventListener('submit', principal.updateTimetableSlot);
    });
  </script>
</body>
</html>
