<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Students | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Student Enrollment & Directory</h2>
            <p class="text-muted small mb-0">Manage student records, assign departments, courses, and semesters.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStudentModal">
              <i class="fas fa-plus-circle me-1"></i> Enroll Student
            </button>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Student Name</th>
                  <th>Roll Number</th>
                  <th>Email</th>
                  <th>Department</th>
                  <th>Course & Semester</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="students-tbody">
                <tr>
                  <td colspan="6" class="text-center py-4 text-muted">Reading students records...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Add Student Modal -->
      <div class="modal fade" id="addStudentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle text-primary me-1"></i> Enroll New Student</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-student-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Full Name</label>
                  <input type="text" id="add-student-name" class="form-control" required placeholder="e.g. Peter Parker">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Roll Number</label>
                  <input type="text" id="add-student-roll" class="form-control" required placeholder="e.g. RC-2026-009">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Email Address</label>
                  <input type="email" id="add-student-email" class="form-control" required placeholder="peter@rajcomputer.com">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Default Password</label>
                  <input type="password" id="add-student-password" class="form-control" required minlength="6" placeholder="Min 6 characters">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="add-student-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Association</label>
                  <select id="add-student-course" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Placement</label>
                  <select id="add-student-sem" class="form-select" required></select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Enroll Student</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Student Modal -->
      <div class="modal fade" id="editStudentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit text-primary me-1"></i> Edit Student Record</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-student-form">
                <input type="hidden" id="edit-student-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Full Name</label>
                  <input type="text" id="edit-student-name" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Roll Number</label>
                  <input type="text" id="edit-student-roll" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Email Address</label>
                  <input type="email" id="edit-student-email" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="edit-student-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Association</label>
                  <select id="edit-student-course" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Placement</label>
                  <select id="edit-student-sem" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Account Status</label>
                  <select id="edit-student-status" class="form-select">
                    <option value="true">Active / Enabled</option>
                    <option value="false">Deactivated / Disabled</option>
                  </select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await principal.populateDeptDropdown('add-student-dept');
      await principal.populateDeptDropdown('edit-student-dept');
      await principal.populateCourseDropdown('add-student-course');
      await principal.populateCourseDropdown('edit-student-course');
      await principal.populateSemesterDropdown('add-student-sem');
      await principal.populateSemesterDropdown('edit-student-sem');

      await principal.loadStudents();

      document.getElementById('add-student-form').addEventListener('submit', principal.createStudent);
      document.getElementById('edit-student-form').addEventListener('submit', principal.updateStudent);
    });
  </script>
</body>
</html>
