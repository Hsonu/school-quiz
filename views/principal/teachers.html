<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Teachers | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Faculty Directory & Assignments</h2>
            <p class="text-muted small mb-0">Administer teacher accounts, map them to departments, and assign subjects.</p>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Teacher Name</th>
                  <th>Email</th>
                  <th>Designation</th>
                  <th>Department</th>
                  <th>Assigned Subjects</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="teachers-tbody">
                <tr>
                  <td colspan="6" class="text-center py-4 text-muted">Reading faculty lists...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Edit Teacher Modal -->
      <div class="modal fade" id="editTeacherModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit text-primary me-1"></i> Edit Faculty Profile</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-teacher-form">
                <input type="hidden" id="edit-teacher-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Full Name</label>
                  <input type="text" id="edit-teacher-name" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Email Address</label>
                  <input type="email" id="edit-teacher-email" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Designation</label>
                  <input type="text" id="edit-teacher-designation" class="form-control">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="edit-teacher-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Account Status</label>
                  <select id="edit-teacher-status" class="form-select">
                    <option value="true">Active / Enabled</option>
                    <option value="false">Deactivated / Disabled</option>
                  </select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Assign Subjects Checkbox Checklist Modal -->
      <div class="modal fade" id="assignSubjectsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
          <div class="modal-content text-dark">
            <div class="modal-header bg-primary text-white">
              <h5 class="modal-title fw-bold"><i class="fas fa-book-open me-1"></i> Mapping Subjects to: <span id="assign-teacher-name-label">-</span></h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="assign-subjects-form">
                <input type="hidden" id="assign-teacher-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small text-muted mb-3">Select academic subjects to assign to this faculty member (Hold Ctrl for multiple, or check boxes):</label>
                  <div class="row px-2" id="assign-subjects-checkboxes">
                    <!-- Checkboxes generated dynamically -->
                  </div>
                </div>
                <div class="mt-4 text-end border-top pt-3">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary px-4">Update Mappings</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await principal.populateDeptDropdown('edit-teacher-dept');
      
      await principal.loadTeachers();

      document.getElementById('edit-teacher-form').addEventListener('submit', principal.updateTeacher);
      document.getElementById('assign-subjects-form').addEventListener('submit', principal.submitSubjectAssignments);
    });
  </script>
</body>
</html>
