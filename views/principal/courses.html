<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Courses | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Manage Academic Courses</h2>
            <p class="text-muted small mb-0">Create, edit, and delete academic courses and associate them to departments.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCourseModal">
              <i class="fas fa-plus-circle me-1"></i> Add Course
            </button>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Course Title</th>
                  <th>Department</th>
                  <th>Duration</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="courses-tbody">
                <tr>
                  <td colspan="4" class="text-center py-4 text-muted">Reading courses database...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Add Course Modal -->
      <div class="modal fade" id="addCourseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle text-primary me-1"></i> Create Academic Course</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-course-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Name</label>
                  <input type="text" id="add-course-name" class="form-control" required placeholder="e.g. Bachelor of Science in CS">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="add-course-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Duration (Years)</label>
                  <input type="number" id="add-course-duration" class="form-control" required min="1" max="6" value="3">
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Create Course</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Course Modal -->
      <div class="modal fade" id="editCourseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit text-primary me-1"></i> Edit Course</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-course-form">
                <input type="hidden" id="edit-course-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Name</label>
                  <input type="text" id="edit-course-name" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="edit-course-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Duration (Years)</label>
                  <input type="number" id="edit-course-duration" class="form-control" required min="1" max="6">
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await principal.populateDeptDropdown('add-course-dept');
      await principal.populateDeptDropdown('edit-course-dept');
      await principal.loadCourses();

      document.getElementById('add-course-form').addEventListener('submit', principal.createCourse);
      document.getElementById('edit-course-form').addEventListener('submit', principal.updateCourse);
    });
  </script>
</body>
</html>
