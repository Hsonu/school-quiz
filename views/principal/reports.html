<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Reports | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2 class="mb-1">Consolidated Academic Reports</h2>
          <p class="text-muted small mb-0">Query real-time student activity databases for attendance status, quiz percentages, and term examination matrices.</p>
        </div>

        <!-- Filter Selection Card -->
        <div class="erp-card p-3 shadow-sm mb-4">
          <form id="reports-query-form" class="row g-3 align-items-end">
            <div class="col-md-8">
              <label class="form-label small fw-semibold text-muted">Select Report Target Category</label>
              <select id="report-type" class="form-select">
                <option value="quiz">Quiz Assessment Logs</option>
                <option value="exam">Term Examinations Result Sheets</option>
                <option value="attendance">Daily Student Attendance logs</option>
              </select>
            </div>
            <div class="col-md-4">
              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"><i class="fas fa-search me-1"></i> Query Database</button>
            </div>
          </form>
        </div>

        <!-- Results Table Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Student Name</th>
                  <th>Roll Number</th>
                  <th>Subject</th>
                  <th>Total Marks</th>
                  <th>Obtained Marks</th>
                  <th>Pass Marks</th>
                  <th>Status (PASS/FAIL)</th>
                  <th>Percentage</th>
                  <th>Timestamp</th>
                </tr>
              </thead>
              <tbody id="reports-tbody">
                <tr>
                  <td colspan="9" class="text-center py-4 text-muted">Run a query search to populate entries.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('reports-query-form').addEventListener('submit', (e) => {
        e.preventDefault();
        principal.loadReports();
      });
    });
  </script>
</body>
</html>
