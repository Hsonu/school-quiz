<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Subjects | Principal Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Manage Subjects</h2>
            <p class="text-muted small mb-0">Create, edit, and delete academic subjects, linking them to departments, courses, and semesters.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSubjectModal">
              <i class="fas fa-plus-circle me-1"></i> Add Subject
            </button>
          </div>
        </div>

        <!-- Filter Card -->
        <div class="card mb-4 erp-card p-3 shadow-sm border-0 bg-light text-dark">
          <div class="row g-3 align-items-end">
            <!-- Search Text -->
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-search me-1"></i> Search Subject</label>
              <input type="text" id="filter-search" class="form-control form-control-sm" placeholder="Search by name...">
            </div>
            <!-- Department Filter -->
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-building me-1"></i> Department</label>
              <select id="filter-dept" class="form-select form-select-sm">
                <option value="">All Departments</option>
              </select>
            </div>
            <!-- Course Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-graduation-cap me-1"></i> Course</label>
              <select id="filter-course" class="form-select form-select-sm">
                <option value="">All Courses</option>
              </select>
            </div>
            <!-- Semester Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-calendar-alt me-1"></i> Semester</label>
              <select id="filter-sem" class="form-select form-select-sm">
                <option value="">All Semesters</option>
              </select>
            </div>
            <!-- Sort By -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-sort me-1"></i> Sort By</label>
              <select id="filter-sort" class="form-select form-select-sm">
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
                <option value="courseName-asc">Course (A-Z)</option>
                <option value="semesterName-asc">Semester (A-Z)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Subject Name</th>
                  <th>Department</th>
                  <th>Course</th>
                  <th>Semester</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="subjects-tbody">
                <tr>
                  <td colspan="5" class="text-center py-4 text-muted">Reading subjects catalog...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Add Subject Modal -->
      <div class="modal fade" id="addSubjectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-plus-circle text-primary me-1"></i> Add Academic Subject</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-subject-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Subject Title</label>
                  <input type="text" id="add-subject-name" class="form-control" required placeholder="e.g. Advanced Calculus">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="add-subject-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Association</label>
                  <select id="add-subject-course" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Placement</label>
                  <select id="add-subject-sem" class="form-select" required></select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Create Subject</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <!-- Edit Subject Modal -->
      <div class="modal fade" id="editSubjectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-edit text-primary me-1"></i> Edit Subject</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="edit-subject-form">
                <input type="hidden" id="edit-subject-id">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Subject Title</label>
                  <input type="text" id="edit-subject-name" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Department Association</label>
                  <select id="edit-subject-dept" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Course Association</label>
                  <select id="edit-subject-course" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Semester Placement</label>
                  <select id="edit-subject-sem" class="form-select" required></select>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/principal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await principal.populateDeptDropdown('add-subject-dept');
      await principal.populateDeptDropdown('edit-subject-dept');
      await principal.populateCourseDropdown('add-subject-course');
      await principal.populateCourseDropdown('edit-subject-course');
      await principal.populateSemesterDropdown('add-subject-sem');
      await principal.populateSemesterDropdown('edit-subject-sem');
      
      await principal.loadSubjects();

      document.getElementById('add-subject-form').addEventListener('submit', principal.createSubject);
      document.getElementById('edit-subject-form').addEventListener('submit', principal.updateSubject);
    });
  </script>
</body>
</html>
