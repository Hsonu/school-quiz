<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Lecture Notes | Teacher Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1">Manage Lecture Notes</h2>
            <p class="text-muted small mb-0">Upload documents and slides for student download directories.</p>
          </div>
          <div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addNotesModal">
              <i class="fas fa-upload me-1"></i> Upload Notes
            </button>
          </div>
        </div>

        <!-- Filter Card -->
        <div class="card mb-4 erp-card p-3 shadow-sm border-0 bg-light text-dark">
          <div class="row g-3 align-items-end">
            <!-- Search Text -->
            <div class="col-md-5">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-search me-1"></i> Search Notes</label>
              <input type="text" id="filter-search" class="form-control form-control-sm" placeholder="Search by title/desc...">
            </div>
            <!-- Subject Filter -->
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-book me-1"></i> Subject</label>
              <select id="filter-subject" class="form-select form-select-sm">
                <option value="">All Subjects</option>
              </select>
            </div>
            <!-- Sort By -->
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-sort me-1"></i> Sort By</label>
              <select id="filter-sort" class="form-select form-select-sm">
                <option value="createdAt-desc">Newest First</option>
                <option value="createdAt-asc">Oldest First</option>
                <option value="title-asc">Title (A-Z)</option>
                <option value="title-desc">Title (Z-A)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Notes Title</th>
                  <th>Subject</th>
                  <th>Attachment</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="notes-tbody">
                <tr>
                  <td colspan="4" class="text-center py-4 text-muted">Reading notes directory...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Upload Notes Modal -->
      <div class="modal fade" id="addNotesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content text-dark">
            <div class="modal-header">
              <h5 class="modal-title fw-bold"><i class="fas fa-file-upload text-primary me-1"></i> Upload Lecture Notes</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <form id="add-notes-form">
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Notes Title</label>
                  <input type="text" id="notesTitle" class="form-control" required placeholder="e.g. Intro to Data Structures">
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Description</label>
                  <textarea id="notesDesc" class="form-control" rows="2" placeholder="Brief outline..."></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Subject Selection</label>
                  <select id="subjectSelect" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-semibold small">Choose Document File</label>
                  <input type="file" id="notesFile" class="form-control" required>
                  <div class="form-text text-muted small">Allowed files: pdf, doc, docx, txt, zip, png, jpg. Max size 10MB.</div>
                </div>
                <div class="mt-4 text-end">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="submit" class="btn btn-primary">Upload notes</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/teacher.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadTeacherSubjects('subjectSelect');
      await loadNotesTable();
      document.getElementById('add-notes-form').addEventListener('submit', uploadNotes);
    });
  </script>
</body>
</html>
