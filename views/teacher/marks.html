<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record Marks | Teacher Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2 class="mb-1">Log & Record Student Marks</h2>
          <p class="text-muted small mb-0">Select subject and assessment details to log student marks sheets.</p>
        </div>

        <!-- Filter Card -->
        <div class="erp-card p-3 shadow-sm mb-4">
          <form id="marks-filter-form" class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label small fw-semibold text-muted">Subject Placements</label>
              <select id="subjectSelect" class="form-select" required>
                <option value="" disabled selected>Select Subject</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold text-muted">Assessment Title</label>
              <input type="text" id="assId" class="form-control" placeholder="e.g. Midterm 1" required>
            </div>
            <div class="col-md-3">
              <label class="form-label small fw-semibold text-muted">Assessment Type</label>
              <select id="assType" class="form-select">
                <option value="exam">Examination Paper</option>
                <option value="quiz">Classroom Quiz</option>
                <option value="assignment">Homework Assignment</option>
              </select>
            </div>
            <div class="col-md-2">
              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"><i class="fas fa-search me-1"></i> Load Students</button>
            </div>
          </form>
        </div>

        <!-- Sheet Form -->
        <form id="marks-sheet-form">
          <div class="erp-card p-0 shadow-sm overflow-hidden mb-4">
            <div class="table-responsive">
              <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Student Name & Roll No</th>
                    <th>Score / Marks Obtained</th>
                    <th>Max / Total Marks</th>
                  </tr>
                </thead>
                <tbody id="marks-tbody">
                  <tr>
                    <td colspan="3" class="text-center py-4 text-muted">Please select a subject to load students.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          
          <div class="text-end">
            <button type="submit" class="btn btn-success px-5 py-2 fw-bold"><i class="fas fa-save me-1"></i> Submit Marks Sheet</button>
          </div>
        </form>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/teacher.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await loadTeacherSubjects('subjectSelect');

      document.getElementById('marks-filter-form').addEventListener('submit', (e) => {
        e.preventDefault();
        loadMarksRoster();
      });

      document.getElementById('marks-sheet-form').addEventListener('submit', submitMarks);
    });
  </script>
</body>
</html>
