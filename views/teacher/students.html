<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Directory | QUIZGEN ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/teacher.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>

<body>

  <div class="dashboard-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2>Student Directory Roster</h2>
          <p class="text-muted small">Overview of students enrolled in academic classes you manage.</p>
        </div>

        <div class="erp-card">
          <div class="erp-table-container">
            <table class="erp-table">
              <thead>
                <tr>
                  <th>Student Name</th>
                  <th>Roll Number</th>
                  <th>Class / Section</th>
                  <th>Institutional Email</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="students-roster-list">
                <tr>
                  <td colspan="5" class="text-center py-4 text-muted">
                    <div class="spinner-border spinner-border-sm text-primary mb-2"></div><br>Loading students roster
                    directory...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

      <footer class="dashboard-footer" id="footer-container"></footer>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/teacher.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadStudentsRoster, 400);
    });
  </script>
</body>

</html>
