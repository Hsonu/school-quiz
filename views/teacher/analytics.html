<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom Analytics | QUIZGEN ERP</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/teacher.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>

<body>

  <div class="dashboard-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2>Classroom Analytics</h2>
          <p class="text-muted small">Visual indicators graphing quiz performance averages and grading patterns.</p>
        </div>

        <div class="row">
          <!-- Quiz Performance -->
          <div class="col-lg-7 mb-4">
            <div class="erp-card h-100">
              <h5 class="mb-4"><i class="fas fa-chart-line text-primary me-2"></i> Quiz Average Score</h5>
              <div style="position: relative; height:320px; width:100%">
                <canvas id="performanceChart"></canvas>
              </div>
            </div>
          </div>

          <!-- Grade distribution -->
          <div class="col-lg-5 mb-4">
            <div class="erp-card h-100">
              <h5 class="mb-4"><i class="fas fa-chart-pie text-primary me-2"></i> Grade Distribution Curve</h5>
              <div
                style="position: relative; height:320px; width:100%; display: flex; justify-content: center; align-items: center">
                <canvas id="gradesChart"></canvas>
              </div>
            </div>
          </div>
        </div>

      </div>

      <footer class="dashboard-footer" id="footer-container"></footer>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/teacher.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Re-use stats loader to compile and render chart canvas
      setTimeout(loadTeacherDashboard, 400);
    });
  </script>
</body>

</html>
