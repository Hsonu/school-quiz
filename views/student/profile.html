<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | QUIZGEN ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/student.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>

<body>

  <div class="dashboard-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2>My Profile Settings</h2>
          <p class="text-muted small">Update your name, account password, and upload a profile picture.</p>
        </div>

        <div class="row">
          <!-- Profile Card -->
          <div class="col-lg-4 mb-4">
            <div class="erp-card text-center">
              <div class="position-relative d-inline-block mb-3">
                <img id="profile-avatar-large" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                  alt="Large Avatar" class="rounded-circle border"
                  style="width: 140px; height: 140px; object-fit: cover">
              </div>
              <h4 class="mb-1" id="profile-card-name">Student Scholar</h4>
              <p class="text-muted small" id="profile-card-role">STUDENT PORTAL</p>
              <hr class="border-color">
              <div class="text-start small text-muted">
                <div class="mb-2"><i class="fas fa-school me-2 text-primary"></i> QUIZGEN Student</div>
                <div><i class="fas fa-calendar-alt me-2 text-primary"></i> Active Member since 2026</div>
              </div>
            </div>
          </div>

          <!-- Edit Profile Form -->
          <div class="col-lg-8">
            <div class="erp-card">
              <h5 class="mb-4"><i class="fas fa-user-edit text-primary me-2"></i> Account Details</h5>

              <form id="student-profile-form">
                <div class="row mb-3">
                  <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label small fw-semibold">Full Name</label>
                    <input type="text" id="profName" class="form-control erp-input" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold">Institutional Email (Read Only)</label>
                    <input type="email" id="profEmail" class="form-control erp-input" disabled>
                  </div>
                </div>

                <div class="row mb-3">
                  <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label small fw-semibold">Class Grade (Read Only)</label>
                    <input type="text" id="profClass" class="form-control erp-input" disabled>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold">Roll Number (Read Only)</label>
                    <input type="text" id="profRoll" class="form-control erp-input" disabled>
                  </div>
                </div>

                <div class="row mb-4">
                  <div class="col-md-6 mb-3 mb-md-0">
                    <label class="form-label small fw-semibold">Change Password (Leave blank to keep current)</label>
                    <input type="password" id="profPassword" class="form-control erp-input"
                      placeholder="New Password (Min 6 characters)">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-semibold">Upload Profile Image</label>
                    <input type="file" id="profPic" class="form-control erp-input" accept="image/*">
                  </div>
                </div>

                <button type="submit" class="btn-premium-primary">
                  <i class="fas fa-save me-1"></i> Save Changes
                </button>
              </form>
            </div>
          </div>
        </div>

      </div>

      <footer class="dashboard-footer" id="footer-container"></footer>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/student.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(async () => {
        await setupStudentProfileForm();

        // Sync profile card indicators
        const u = api.getUser();
        if (u) {
          document.getElementById('profile-card-name').textContent = u.name;
          document.getElementById('profile-card-role').textContent = `ROLL NO: ${u.rollNo}`;
        }
      }, 400);
    });
  </script>
</body>

</html>
