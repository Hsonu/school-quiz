<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Tracker | Student Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="row mb-4 align-items-center">
          <div class="col-md-8">
            <h2 class="mb-1">My Attendance Tracker</h2>
            <p class="text-muted small mb-0">Monitor your attendance log metrics across class semesters.</p>
          </div>
          <div class="col-md-4 text-end">
            <div class="d-inline-block bg-light-primary border rounded p-3 text-center">
              <span class="d-block text-muted small fw-semibold">Overall Attendance</span>
              <h2 class="mb-0 text-primary fw-bold" id="attendance-percentage">-</h2>
              <span class="small text-muted" id="total-attendance-logs">-</span>
            </div>
          </div>
        </div>

        <!-- Attendance Logs table -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Lecture Date</th>
                  <th>Topic / Placement</th>
                  <th>Status Log</th>
                </tr>
              </thead>
              <tbody id="attendance-logs-tbody">
                <tr>
                  <td colspan="3" class="text-center py-4 text-muted">Reading attendance registry...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/student.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadAttendanceStats();
    });
  </script>
</body>
</html>
