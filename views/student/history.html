<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results History | QUIZGEN ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/student.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>

<body>

  <div class="dashboard-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2>My Results History</h2>
          <p class="text-muted small">Access and review all graded quizzes you have completed in the portal.</p>
        </div>

        <!-- Filter Card -->
        <div class="card mb-4 erp-card p-3 shadow-sm border-0 bg-light text-dark">
          <div class="row g-3 align-items-end">
            <!-- Search Text -->
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-search me-1"></i> Search
                Title</label>
              <input type="text" id="filter-search" class="form-control form-control-sm"
                placeholder="Search assessment...">
            </div>
            <!-- Type Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-filter me-1"></i> Assessment
                Type</label>
              <select id="filter-type" class="form-select form-select-sm">
                <option value="">All Types</option>
                <option value="quiz">Quiz</option>
                <option value="exam">Exam</option>
              </select>
            </div>
            <!-- Class Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-school me-1"></i> Class</label>
              <select id="filter-class" class="form-select form-select-sm">
                <option value="">All Classes</option>
              </select>
            </div>
            <!-- Course Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-graduation-cap me-1"></i>
                Course</label>
              <select id="filter-course" class="form-select form-select-sm">
                <option value="">All Courses</option>
              </select>
            </div>
            <!-- Semester Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-calendar-alt me-1"></i>
                Semester</label>
              <select id="filter-semester" class="form-select form-select-sm">
                <option value="">All Semesters</option>
              </select>
            </div>
            <!-- Subject Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-book me-1"></i> Subject</label>
              <select id="filter-subject" class="form-select form-select-sm">
                <option value="">All Subjects</option>
              </select>
            </div>
            <!-- End Date Filter -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-calendar-check me-1"></i> Date
                (End)</label>
              <input type="date" id="filter-date" class="form-control form-control-sm">
            </div>
            <!-- Sort By -->
            <div class="col-md-2">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-sort me-1"></i> Sort By</label>
              <select id="filter-sort" class="form-select form-select-sm">
                <option value="createdAt-desc">Newest Attempted</option>
                <option value="createdAt-asc">Oldest Attempted</option>
                <option value="quizTitle-asc">Title (A-Z)</option>
                <option value="percentage-desc">Accuracy (High-Low)</option>
                <option value="percentage-asc">Accuracy (Low-High)</option>
              </select>
            </div>
          </div>
        </div>

        <div class="erp-card">
          <div class="erp-table-container">
            <table class="erp-table">
              <thead>
                <tr>
                  <th>Assessment Title</th>
                  <th>Subject</th>
                  <th>Total Marks</th>
                  <th>Obtained Marks</th>
                  <th>Pass Marks</th>
                  <th>Status (PASS/FAIL)</th>
                  <th>Percentage</th>
                  <th>Date Attempted</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="history-list">
                <tr>
                  <td colspan="9" class="text-center py-4 text-muted">
                    <div class="spinner-border spinner-border-sm text-primary mb-2"></div><br>Compiling historical
                    attempt logs...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

      <footer class="dashboard-footer" id="footer-container"></footer>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/student.js?v=2"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadResultsHistory, 400);
    });
  </script>
</body>

</html>
