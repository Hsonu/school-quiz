<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Lecture Notes | Student Portal</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2 class="mb-1">Download Lecture Notes & Materials</h2>
          <p class="text-muted small mb-0">Access notes, slide decks, and reference guides uploaded by teachers.</p>
        </div>

        <!-- Filter Card -->
        <div class="card mb-4 erp-card p-3 shadow-sm border-0 bg-light text-dark">
          <div class="row g-3 align-items-end">
            <!-- Search Text -->
            <div class="col-md-5">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-search me-1"></i> Search Notes</label>
              <input type="text" id="filter-search" class="form-control form-control-sm" placeholder="Search by topic/desc...">
            </div>
            <!-- Subject Filter -->
            <div class="col-md-4">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-book me-1"></i> Subject</label>
              <select id="filter-subject" class="form-select form-select-sm">
                <option value="">All Subjects</option>
              </select>
            </div>
            <!-- Sort By -->
            <div class="col-md-3">
              <label class="form-label fw-semibold small text-muted"><i class="fas fa-sort me-1"></i> Sort By</label>
              <select id="filter-sort" class="form-select form-select-sm">
                <option value="createdAt-desc">Newest First</option>
                <option value="createdAt-asc">Oldest First</option>
                <option value="title-asc">Title (A-Z)</option>
                <option value="title-desc">Title (Z-A)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Data Card -->
        <div class="erp-card p-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Topic Title</th>
                  <th>Subject</th>
                  <th>Faculty Instructor</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="notes-tbody">
                <tr>
                  <td colspan="4" class="text-center py-4 text-muted">Reading download directories...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <footer class="footer-container" id="footer-container"></footer>
    </div>
  </div>

  <!-- API and layouts scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/student.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadStudentNotes();
    });
  </script>
</body>
</html>
