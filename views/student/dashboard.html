<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | QUIZGEN ERP</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom Styles -->
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/student.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>

<body>

  <div class="dashboard-container">
    <!-- Sidebar Placeholder -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Navbar Placeholder -->
      <div id="navbar-container"></div>

      <!-- Dashboard Panel Body -->
      <div class="dashboard-body animated-fade">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h2 class="mb-1" id="welcome-user-text">Welcome Back</h2>
            <p class="text-muted small mb-0" id="student-sub-details">Grade: Loading... | Roll No: Loading...</p>
          </div>
          <div>
            <a href="/student/selectQuiz" class="btn-premium-primary text-decoration-none">
              <i class="fas fa-pen-alt me-1"></i> Take a Quiz
            </a>
          </div>
        </div>

        <!-- Stats Cards Grid -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-info">
              <span class="stat-label">Enrolled Subjects</span>
              <span class="stat-value" id="count-subjects">-</span>
            </div>
            <div class="stat-icon-wrapper icon-blue">
              <i class="fas fa-book"></i>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-info">
              <span class="stat-label">Quizzes Completed</span>
              <span class="stat-value" id="count-completed">-</span>
            </div>
            <div class="stat-icon-wrapper icon-green">
              <i class="fas fa-check-double"></i>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-info">
              <span class="stat-label">Quizzes Pending</span>
              <span class="stat-value" id="count-pending">-</span>
            </div>
            <div class="stat-icon-wrapper icon-yellow">
              <i class="fas fa-hourglass-half"></i>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-info">
              <span class="stat-label">Average Score</span>
              <span class="stat-value" id="count-avg">-</span>
            </div>
            <div class="stat-icon-wrapper icon-red">
              <i class="fas fa-award"></i>
            </div>
          </div>
        </div>

        <!-- Charts & Activity Grid -->
        <div class="dashboard-grid">
          <!-- Score line progress graph -->
          <div class="erp-card">
            <h5 class="mb-4"><i class="fas fa-chart-line text-primary me-2"></i> My Score Progression</h5>
            <div style="position: relative; height:300px; width:100%">
              <canvas id="progressionChart"></canvas>
            </div>
          </div>

          <!-- Recent attempted quizzes list -->
          <div class="erp-card">
            <h5 class="mb-3"><i class="fas fa-history text-primary me-2"></i> Recent Completed Quizzes</h5>
            <div class="erp-table-container">
              <table class="erp-table">
                <thead>
                  <tr>
                    <th>Quiz Title</th>
                    <th>Subject</th>
                    <th>Score</th>
                    <th>Result</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="recent-quizzes-list">
                  <tr>
                    <td colspan="5" class="text-center py-4 text-muted">
                      <div class="spinner-border spinner-border-sm text-primary mb-2"></div><br>Compiling your quiz
                      history...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <footer class="dashboard-footer" id="footer-container"></footer>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/student.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(loadStudentDashboard, 400);
    });
  </script>
</body>

</html>
