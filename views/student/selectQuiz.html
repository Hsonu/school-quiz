<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Quizzes | QUIZGEN ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
  <link href="/css/dashboard.css" rel="stylesheet">
  <link href="/css/student.css" rel="stylesheet">
  <link href="/css/responsive.css" rel="stylesheet">
</head>

<body>

  <div class="dashboard-container">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <div id="navbar-container"></div>

      <div class="dashboard-body animated-fade">
        <div class="mb-4">
          <h2>Published Quizzes</h2>
          <p class="text-muted small">Choose an online test to take or review your graded sheets.</p>
        </div>

        <!-- Class and Subject Filter Selectors -->
        <div class="row mb-4 g-3 bg-light p-3 rounded text-dark shadow-sm align-items-end">
          <div class="col-md-3">
            <label class="form-label small fw-semibold text-muted"><i class="fas fa-search me-1"></i> Search
              Quizzes</label>
            <input type="text" id="filter-search" class="form-control form-control-sm"
              placeholder="Search by title/desc...">
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-semibold text-muted"><i class="fas fa-school me-1"></i> Class Grade /
              Section</label>
            <select id="classSelectFilter" class="form-select form-select-sm">
              <option value="" disabled selected>Loading classes...</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold text-muted"><i class="fas fa-book me-1"></i> Course
              Subject</label>
            <select id="subjectSelectFilter" class="form-select form-select-sm">
              <option value="" selected>All Subjects</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold text-muted"><i class="fas fa-info-circle me-1"></i>
              Status</label>
            <select id="filter-status" class="form-select form-select-sm">
              <option value="">All Statuses</option>
              <option value="attempted">Attempted</option>
              <option value="unattempted">Unattempted</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label small fw-semibold text-muted"><i class="fas fa-sort me-1"></i> Sort By</label>
            <select id="filter-sort" class="form-select form-select-sm">
              <option value="title-asc">Title (A-Z)</option>
              <option value="title-desc">Title (Z-A)</option>
              <option value="duration-asc">Duration (Shortest)</option>
              <option value="duration-desc">Duration (Longest)</option>
              <option value="totalMarks-desc">Total Marks (Highest)</option>
            </select>
          </div>
        </div>

        <div class="row" id="available-quizzes-grid">
          <!-- Dynamic available quizzes list load here -->
          <div class="col-12 text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm text-primary mb-2"></div><br>Searching active quiz portals...
          </div>
        </div>

      </div>

      <footer class="dashboard-footer" id="footer-container"></footer>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/student.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(initStudentQuizSelection, 400);
    });
  </script>
</body>

</html>
